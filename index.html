<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Demo_12_UIRefresh</title>
    <link rel="stylesheet" href="./css/styles.css?v=perfumer-20260616">
  </head>
  <body>
    <main class="shell">
      <section class="game-frame" aria-label="Demo_12_UIRefresh">
        <canvas id="gameCanvas"></canvas>

        <div class="role-overlay" id="roleOverlay">
          <div class="role-dialog" aria-label="选择阵营">
            <p class="eyebrow">Demo_12_UIRefresh</p>
            <h2 id="roleDialogTitle">选择阵营</h2>
            <div class="role-actions" id="roleActions">
              <button type="button" class="role-button survivor" data-role="survivor">
                <span>逃生阵营</span>
                <strong>Space 板窗 · E 救援/治疗/修理/开门</strong>
              </button>
              <button type="button" class="role-button hunter" data-role="hunter">
                <span>追捕阵营</span>
                <strong>J 攻击 · Space 牵起/挂椅/踩板窗</strong>
              </button>
              <button type="button" class="role-button fun-mode" data-mode="infiniteSawbone">
                <span>娱乐模式 · 无限车的锯骨</span>
                <strong>开局二阶 · 无限耐久拉锯 · 单人跑图</strong>
              </button>
            </div>
            <div class="character-panel is-hidden" id="characterPanel">
              <div class="character-actions">
                <button type="button" class="back-button" id="characterBackButton">返回</button>
                <button type="button" class="back-button primary is-hidden" id="characterNextButton">下一步</button>
              </div>
              <form class="hidden-unlock is-hidden" id="hiddenUnlockForm" autocomplete="off">
                <input id="hiddenCodeInput" name="hiddenCode" type="text" inputmode="text" autocapitalize="none" spellcheck="false" placeholder="暗号">
                <button type="submit">确认</button>
              </form>
              <div class="character-grid">
                <button type="button" class="character-button survivor" data-character-role="survivor" data-character="clockmaker">
                  <span>钟表匠 · 修机位</span>
                  <strong>精准校准，Q 放置装置后可回溯隐身</strong>
                </button>
                <button type="button" class="character-button survivor" data-character-role="survivor" data-character="actor">
                  <span>演员 · 救人位</span>
                  <strong>表演本能，Q 魔术秀，F 切换选项</strong>
                </button>
                <button type="button" class="character-button survivor" data-character-role="survivor" data-character="messenger">
                  <span>信使 · 牵制位</span>
                  <strong>翻越更快，Q 投掷邮包打断追捕者</strong>
                </button>
                <button type="button" class="character-button survivor" data-character-role="survivor" data-character="apprentice">
                  <span>学徒 · 辅助位</span>
                  <strong>Q 放针线包，受伤队友拾取后延迟回血</strong>
                </button>
                <button type="button" class="character-button survivor" data-character-role="survivor" data-character="perfumer">
                  <span>调香师 · 牵制位</span>
                  <strong>嗅感预警，Q 释放迷香；四次后点燃幻香大阵</strong>
                </button>
                <button type="button" class="character-button hunter" data-character-role="hunter" data-character="standard">
                  <span>标准追捕者</span>
                  <strong>均衡移速、攻击和后摇</strong>
                </button>
                <button type="button" class="character-button hunter" data-character-role="hunter" data-character="brute">
                  <span>重击追捕者</span>
                  <strong>攻击更远，移速略慢，后摇更久</strong>
                </button>
                <button type="button" class="character-button hunter" data-character-role="hunter" data-character="lanternKeeper">
                  <span>提灯人</span>
                  <strong>暗灯压修，Q 放置寄魂灯监视区域</strong>
                </button>
                <button type="button" class="character-button hunter" data-character-role="hunter" data-character="sawbone">
                  <span>锯骨</span>
                  <strong>普攻叠流血，Q 拉锯；二阶只因命中或撞墙停</strong>
                </button>
                <button type="button" class="character-button hunter" data-character-role="hunter" data-character="soulBinder">
                  <span>引魂师</span>
                  <strong>普攻叠魂印，Q 摄魂，E 借魂，F 引魂归途</strong>
                </button>
                <button type="button" class="character-button hunter secret is-hidden" data-character-role="hunter" data-character="twinSword" data-hidden-character="true">
                  <span>双生剑仙 · 隐藏监管者</span>
                  <strong>Q 双生切换，E/R 形态技能，F 发射飞剑</strong>
                </button>
              </div>
              <div class="badge-panel" id="badgePanel" aria-label="徽章天赋">
                <div class="badge-header">
                  <span>徽章天赋</span>
                  <strong id="badgeLimitReadout">紫 0/1 · 蓝 0/4</strong>
                </div>
                <div class="badge-grid">
                  <button type="button" class="badge-button survivor blue" data-badge-role="survivor" data-badge-rarity="blue" data-badge="cipher">
                    <span>蓝 · 齿轮</span>
                    <strong>修理速度提高</strong>
                  </button>
                  <button type="button" class="badge-button survivor blue" data-badge-role="survivor" data-badge-rarity="blue" data-badge="kite">
                    <span>蓝 · 羽步</span>
                    <strong>翻越更快，吃刀加速更久</strong>
                  </button>
                  <button type="button" class="badge-button survivor blue" data-badge-role="survivor" data-badge-rarity="blue" data-badge="aid">
                    <span>蓝 · 援护</span>
                    <strong>治疗和救援更快</strong>
                  </button>
                  <button type="button" class="badge-button survivor blue" data-badge-role="survivor" data-badge-rarity="blue" data-badge="ember">
                    <span>蓝 · 余火</span>
                    <strong>倒地爬行更快，受击加速略久</strong>
                  </button>
                  <button type="button" class="badge-button survivor purple" data-badge-role="survivor" data-badge-rarity="purple" data-badge="adrenaline">
                    <span>紫 · 回光返照</span>
                    <strong>5 台机修完后回一格血，并加速 5 秒</strong>
                  </button>
                  <button type="button" class="badge-button hunter purple" data-badge-role="hunter" data-badge-rarity="purple" data-badge="detention">
                    <span>紫 · 挽留</span>
                    <strong>5 台机修完后普攻命中直接倒地</strong>
                  </button>
                  <button type="button" class="badge-button hunter blue" data-badge-role="hunter" data-badge-rarity="blue" data-badge="hunt">
                    <span>蓝 · 猎步</span>
                    <strong>追捕移速提高</strong>
                  </button>
                  <button type="button" class="badge-button hunter blue" data-badge-role="hunter" data-badge-rarity="blue" data-badge="blade">
                    <span>蓝 · 锋刃</span>
                    <strong>刀气范围提高</strong>
                  </button>
                  <button type="button" class="badge-button hunter blue" data-badge-role="hunter" data-badge-rarity="blue" data-badge="pressure">
                    <span>蓝 · 压迫</span>
                    <strong>挂椅淘汰进度略快</strong>
                  </button>
                  <button type="button" class="badge-button hunter blue" data-badge-role="hunter" data-badge-rarity="blue" data-badge="wipe">
                    <span>蓝 · 收刀</span>
                    <strong>命中擦刀和空刀后摇略短</strong>
                  </button>
                </div>
              </div>
              <div class="assist-panel is-hidden" id="assistPanel" aria-label="辅助技能">
                <div class="badge-header">
                  <span>辅助技能</span>
                  <strong id="assistLimitReadout">携带 1 个</strong>
                </div>
                <div class="assist-grid">
                  <button type="button" class="assist-button" data-assist="listen">
                    <span>1 · 聆听</span>
                    <strong>显示正在移动的逃生者位置</strong>
                  </button>
                  <button type="button" class="assist-button" data-assist="peeper">
                    <span>2 · 插眼</span>
                    <strong>放置小范围眼位，减交互并爆点</strong>
                  </button>
                  <button type="button" class="assist-button" data-assist="patroller">
                    <span>3 · 巡视者</span>
                    <strong>放出可控制巡视者，咬中控制并减速</strong>
                  </button>
                  <button type="button" class="assist-button" data-assist="blink">
                    <span>4 · 闪现</span>
                    <strong>向前闪现，闪现前出刀延后结算</strong>
                  </button>
                  <button type="button" class="assist-button" data-assist="shift">
                    <span>5 · 移形</span>
                    <strong>瞄准放置远端门，并在脚底生成近端门</strong>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="hud hud-top">
          <div>
            <p class="eyebrow">Demo_12_UIRefresh</p>
            <h1>新UI开发原型</h1>
          </div>
          <div class="cipher-banner" aria-label="密码机进度">
            <strong id="cipherStatusReadout">五台密码机尚未破译</strong>
          </div>
          <div class="survivor-status-grid" id="survivorStatusGrid" aria-label="求生者状态">
            <div class="survivor-status-card"></div>
            <div class="survivor-status-card"></div>
            <div class="survivor-status-card"></div>
            <div class="survivor-status-card"></div>
          </div>
        </div>

        <div class="hud hud-bottom">
          <div class="cooldown-panel" id="cooldownPanel" aria-label="技能冷却">
            <div class="cooldown-chip">
              <span>操作</span>
              <strong id="controlsReadout">E / Space</strong>
            </div>
          </div>
        </div>

        <div class="touch-stick" id="touchStick" aria-hidden="true">
          <div class="touch-knob" id="touchKnob"></div>
        </div>

        <div class="touch-actions" id="touchActions" aria-label="触控操作">
          <button type="button" class="touch-action use" id="touchUseButton">使用</button>
          <button type="button" class="touch-action interact" id="touchInteractButton">交互</button>
          <button type="button" class="touch-action attack" id="touchAttackButton">攻击</button>
          <button type="button" class="touch-action skill" id="touchSkillButton">技能</button>
          <button type="button" class="touch-action shadow" id="touchShadowButton">灯影</button>
        </div>
      </section>
    </main>

    <script src="./js/main.js?v=perfumer-20260616"></script>
  </body>
</html>
