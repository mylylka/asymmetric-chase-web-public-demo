<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Demo_10_3DViewPrototype</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07110c;
        --panel: rgba(10, 21, 16, 0.88);
        --panel-strong: rgba(14, 32, 24, 0.95);
        --line: rgba(199, 224, 205, 0.24);
        --text: #eef6ed;
        --muted: #a9b9ad;
        --gold: #dfbf67;
        --green: #71c18f;
        --red: #d77b6e;
        --blue: #73a9df;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        touch-action: none;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100dvh;
        min-height: 520px;
        overflow: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          radial-gradient(circle at 22% 18%, rgba(113, 193, 143, 0.12), transparent 28%),
          #07110c;
        background-size: 64px 64px, 64px 64px, auto, auto;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 28px;
        background: rgba(3, 10, 7, 0.64);
        backdrop-filter: blur(14px);
      }

      .mode-panel {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        box-shadow: 0 24px 90px rgba(0, 0, 0, 0.42);
        padding: clamp(22px, 4vw, 38px);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--gold);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(34px, 5vw, 56px);
        line-height: 1.02;
      }

      .mode-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 24px;
      }

      .mode-card,
      .role-chip,
      .hud-button {
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(32, 55, 43, 0.74);
        font: inherit;
      }

      .mode-card {
        min-height: 150px;
        padding: 22px;
        text-align: left;
        text-decoration: none;
        cursor: pointer;
      }

      .mode-card:hover,
      .role-chip.is-active,
      .hud-button:hover {
        border-color: rgba(223, 191, 103, 0.72);
        background: rgba(49, 75, 58, 0.92);
      }

      .mode-card span {
        display: block;
        margin-bottom: 12px;
        font-size: 28px;
        font-weight: 900;
      }

      .mode-card strong {
        display: block;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.55;
      }

      .role-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 18px;
      }

      .role-chip {
        min-height: 42px;
        padding: 8px 16px;
        cursor: pointer;
        font-weight: 800;
      }

      .hud {
        position: absolute;
        z-index: 5;
        pointer-events: none;
      }

      .top-hud {
        top: max(18px, env(safe-area-inset-top));
        left: max(18px, env(safe-area-inset-left));
        right: max(18px, env(safe-area-inset-right));
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
      }

      .hud-panel {
        border: 1px solid rgba(199, 224, 205, 0.18);
        border-radius: 8px;
        background: rgba(8, 18, 13, 0.72);
        padding: 12px 14px;
        backdrop-filter: blur(8px);
      }

      .hud-title h2 {
        margin: 0;
        font-size: clamp(22px, 3vw, 34px);
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(84px, 1fr));
        gap: 8px;
      }

      .stat span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .stat strong {
        display: block;
        margin-top: 2px;
        font-size: 20px;
      }

      .mini-map {
        position: absolute;
        left: max(18px, env(safe-area-inset-left));
        bottom: max(18px, env(safe-area-inset-bottom));
        z-index: 6;
        width: 190px;
        height: 150px;
        border: 1px solid rgba(199, 224, 205, 0.25);
        border-radius: 8px;
        background: rgba(6, 14, 10, 0.78);
        pointer-events: none;
      }

      .controls {
        position: absolute;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      .move-pad {
        position: absolute;
        left: max(20px, env(safe-area-inset-left));
        bottom: max(36px, env(safe-area-inset-bottom));
        width: clamp(132px, 18vw, 188px);
        aspect-ratio: 1;
        border: 2px solid rgba(199, 224, 205, 0.22);
        border-radius: 50%;
        background: rgba(238, 246, 237, 0.08);
        pointer-events: auto;
        touch-action: none;
      }

      .move-knob {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 44%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: var(--gold);
        transform: translate(-50%, -50%);
      }

      .look-pad {
        position: absolute;
        top: 18%;
        right: 0;
        bottom: 0;
        width: 46%;
        pointer-events: auto;
        touch-action: none;
      }

      .look-pad::after {
        content: "滑动视角";
        position: absolute;
        right: max(18px, env(safe-area-inset-right));
        bottom: max(30px, env(safe-area-inset-bottom));
        padding: 9px 12px;
        border: 1px solid rgba(199, 224, 205, 0.18);
        border-radius: 8px;
        color: rgba(238, 246, 237, 0.72);
        background: rgba(8, 18, 13, 0.58);
        font-size: 13px;
        font-weight: 800;
      }

      .action-pad {
        position: absolute;
        right: max(22px, env(safe-area-inset-right));
        bottom: max(34px, env(safe-area-inset-bottom));
        display: grid;
        grid-template-columns: repeat(2, 72px);
        gap: 10px;
        z-index: 2;
        pointer-events: auto;
      }

      .action-prompt {
        position: absolute;
        left: 50%;
        bottom: max(112px, calc(env(safe-area-inset-bottom) + 108px));
        transform: translateX(-50%);
        min-width: 112px;
        max-width: min(420px, calc(100vw - 36px));
        padding: 9px 14px;
        border: 1px solid rgba(223, 191, 103, 0.42);
        border-radius: 8px;
        color: var(--text);
        background: rgba(8, 18, 13, 0.78);
        font-size: 16px;
        font-weight: 900;
        text-align: center;
        pointer-events: none;
      }

      .action-prompt.is-hidden {
        display: none;
      }

      .action-button {
        min-height: 58px;
        border: 1px solid rgba(199, 224, 205, 0.24);
        border-radius: 8px;
        color: var(--text);
        background: rgba(8, 18, 13, 0.76);
        font: 900 17px/1.1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        touch-action: manipulation;
      }

      .action-button span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .action-button.is-active {
        border-color: rgba(223, 191, 103, 0.78);
        background: rgba(49, 75, 58, 0.94);
      }

      .action-button.attack {
        grid-column: 2;
        color: #f4d6d0;
        border-color: rgba(215, 123, 110, 0.42);
      }

      .hud-button {
        pointer-events: auto;
        min-height: 42px;
        padding: 8px 14px;
        cursor: pointer;
        font-weight: 800;
      }

      .screen-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-bottom: 8px;
      }

      .is-hidden {
        display: none;
      }

      @media (max-width: 760px) {
        .mode-grid {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .stat:nth-child(2),
        .stat:nth-child(3) {
          display: none;
        }

        .mini-map {
          width: 150px;
          height: 118px;
          bottom: calc(max(18px, env(safe-area-inset-bottom)) + 128px);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="2D 与 3D 版本选择">
      <canvas id="view3d"></canvas>

      <section class="overlay" id="modeOverlay" aria-label="选择版本">
        <div class="mode-panel">
          <p class="eyebrow">Demo_10_3DViewPrototype</p>
          <h1>选择版本</h1>
          <div class="role-row" aria-label="3D 视角身份">
            <button type="button" class="role-chip is-active" data-role="survivor">逃生者视角</button>
            <button type="button" class="role-chip" data-role="hunter">追捕者视角</button>
          </div>
          <div class="mode-grid">
            <a class="mode-card" href="./index.html">
              <span>二维新版</span>
              <strong>进入 Demo_12_UIRefresh，后续专门用于重做操作界面和视觉层级。</strong>
            </a>
            <a class="mode-card" href="./demos/demo-11-actor-complete.html">
              <span>完整玩法冻结版</span>
              <strong>保留当前修机、救援、角色技能、装置素材和完整对局系统。</strong>
            </a>
            <button type="button" class="mode-card" id="start3dButton">
              <span>三维试验版</span>
              <strong>测试高墙、矮墙、视线遮挡、角色身高差和按视角移动。</strong>
            </button>
          </div>
        </div>
      </section>

      <section class="hud top-hud" aria-label="3D 状态">
        <div class="hud-panel hud-title">
          <p class="eyebrow">Demo_10_3DViewPrototype</p>
          <h2>3D 视角原型</h2>
        </div>
        <div>
          <div class="screen-actions">
            <a class="hud-button" href="./index.html">二维版</a>
            <button type="button" class="hud-button" id="changeModeButton">选择版本</button>
          </div>
          <div class="hud-panel stats">
            <div class="stat">
              <span>视角</span>
              <strong id="roleReadout">逃生者</strong>
            </div>
            <div class="stat">
              <span>修理</span>
              <strong id="repairReadout">0/5</strong>
            </div>
            <div class="stat">
              <span>交互</span>
              <strong id="actionReadout">-</strong>
            </div>
          </div>
        </div>
      </section>

      <canvas class="mini-map" id="miniMap" width="190" height="150" aria-hidden="true"></canvas>

      <section class="controls" aria-label="平板控制">
        <div class="move-pad" id="movePad">
          <div class="move-knob" id="moveKnob"></div>
        </div>
        <div class="look-pad" id="lookPad"></div>
        <div class="action-prompt is-hidden" id="actionPrompt">-</div>
        <div class="action-pad" aria-label="3D 操作按钮">
          <button class="action-button" id="actionUseButton" type="button">Space<span>板窗</span></button>
          <button class="action-button attack" id="actionAttackButton" type="button">J<span>攻击</span></button>
          <button class="action-button" id="actionInteractButton" type="button">E<span>交互</span></button>
        </div>
      </section>
    </main>

    <script type="application/json" id="legacy-first-person-prototype">
      (() => {
        const canvas = document.getElementById("view3d");
        const ctx = canvas.getContext("2d");
        const miniCanvas = document.getElementById("miniMap");
        const mini = miniCanvas.getContext("2d");
        const overlay = document.getElementById("modeOverlay");
        const start3dButton = document.getElementById("start3dButton");
        const changeModeButton = document.getElementById("changeModeButton");
        const roleReadout = document.getElementById("roleReadout");
        const roleButtons = Array.from(document.querySelectorAll(".role-chip"));
        const movePad = document.getElementById("movePad");
        const moveKnob = document.getElementById("moveKnob");
        const lookPad = document.getElementById("lookPad");

        const TILE = 96;
        const FOV = Math.PI / 2.25;
        const MAX_DISTANCE = TILE * 14;
        const MOVE_SPEED = 228;
        const HUNTER_MOVE_SPEED = 260;
        const TURN_SPEED = 1.5;
        const PITCH_SPEED = 0.82;
        const TOUCH_LOOK_X = 0.004;
        const TOUCH_LOOK_Y = 0.0024;

        const world = [
          "1111111111111111",
          "1000000000000001",
          "1001110000110001",
          "1001000000010001",
          "1001000220010001",
          "1000000000000001",
          "1220001110000221",
          "1000001010000001",
          "1002201010220001",
          "1000000000000001",
          "1000110001110001",
          "1000010001000001",
          "1000010001002201",
          "1000000000000001",
          "1111111111111111"
        ].map((row) => row.split("").map(Number));

        const actors = [
          { type: "hunter", name: "追捕者", x: 12.2 * TILE, y: 4.5 * TILE, radius: 20, height: 1.24, color: "#d77b6e" },
          { type: "survivor", name: "队友", x: 4.4 * TILE, y: 10.2 * TILE, radius: 16, height: 0.92, color: "#73a9df" },
          { type: "survivor", name: "队友", x: 10.8 * TILE, y: 11.7 * TILE, radius: 16, height: 0.92, color: "#71c18f" }
        ];

        const player = {
          role: "survivor",
          x: 2.7 * TILE,
          y: 2.3 * TILE,
          angle: 0,
          pitch: 0,
          radius: 18,
          moveX: 0,
          moveY: 0
        };

        let width = 0;
        let height = 0;
        let dpr = 1;
        let running = false;
        let lastTime = performance.now();
        let rayDepths = [];
        const keys = new Set();

        function resize() {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          width = Math.max(1, Math.floor(window.innerWidth));
          height = Math.max(1, Math.floor(window.innerHeight));
          canvas.width = Math.floor(width * dpr);
          canvas.height = Math.floor(height * dpr);
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          rayDepths = new Array(width).fill(MAX_DISTANCE);
        }

        function normalizeAngle(angle) {
          while (angle < -Math.PI) angle += Math.PI * 2;
          while (angle > Math.PI) angle -= Math.PI * 2;
          return angle;
        }

        function clamp(value, min, max) {
          return Math.max(min, Math.min(max, value));
        }

        function cellAt(x, y) {
          const col = Math.floor(x / TILE);
          const row = Math.floor(y / TILE);
          if (row < 0 || row >= world.length || col < 0 || col >= world[0].length) {
            return 1;
          }
          return world[row][col];
        }

        function isBlocked(x, y) {
          return cellAt(x, y) > 0;
        }

        function canStandAt(x, y, radius) {
          return !isBlocked(x - radius, y - radius)
            && !isBlocked(x + radius, y - radius)
            && !isBlocked(x - radius, y + radius)
            && !isBlocked(x + radius, y + radius);
        }

        function movePlayer(dt) {
          const forward = (keys.has("KeyW") ? 1 : 0) - (keys.has("KeyS") ? 1 : 0);
          const strafe = (keys.has("KeyD") ? 1 : 0) - (keys.has("KeyA") ? 1 : 0);
          const inputX = strafe + player.moveX;
          const inputY = forward + player.moveY;
          const length = Math.hypot(inputX, inputY);
          if (length <= 0.01) return;

          const nx = inputX / length;
          const ny = inputY / length;
          const speed = player.role === "hunter" ? HUNTER_MOVE_SPEED : MOVE_SPEED;
          const cos = Math.cos(player.angle);
          const sin = Math.sin(player.angle);
          const dx = (cos * ny + Math.cos(player.angle + Math.PI / 2) * nx) * speed * dt;
          const dy = (sin * ny + Math.sin(player.angle + Math.PI / 2) * nx) * speed * dt;

          if (canStandAt(player.x + dx, player.y, player.radius)) player.x += dx;
          if (canStandAt(player.x, player.y + dy, player.radius)) player.y += dy;
        }

        function turnPlayer(dt) {
          if (keys.has("ArrowLeft")) player.angle -= TURN_SPEED * dt;
          if (keys.has("ArrowRight")) player.angle += TURN_SPEED * dt;
          if (keys.has("ArrowUp")) player.pitch = clamp(player.pitch - PITCH_SPEED * dt, -0.42, 0.42);
          if (keys.has("ArrowDown")) player.pitch = clamp(player.pitch + PITCH_SPEED * dt, -0.42, 0.42);
          player.angle = normalizeAngle(player.angle);
        }

        function castRay(angle) {
          const step = 5;
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          let distance = 0;
          while (distance < MAX_DISTANCE) {
            distance += step;
            const x = player.x + cos * distance;
            const y = player.y + sin * distance;
            const tile = cellAt(x, y);
            if (tile > 0) {
              return { distance, tile, x, y };
            }
          }
          return { distance: MAX_DISTANCE, tile: 0, x: player.x + cos * MAX_DISTANCE, y: player.y + sin * MAX_DISTANCE };
        }

        function shadeColor(base, amount) {
          const color = base.replace("#", "");
          const r = clamp(parseInt(color.slice(0, 2), 16) + amount, 0, 255);
          const g = clamp(parseInt(color.slice(2, 4), 16) + amount, 0, 255);
          const b = clamp(parseInt(color.slice(4, 6), 16) + amount, 0, 255);
          return `rgb(${r}, ${g}, ${b})`;
        }

        function drawScene() {
          const horizon = height * 0.52 + player.pitch * height * 0.42 - (player.role === "hunter" ? 18 : 0);
          const gradientSky = ctx.createLinearGradient(0, 0, 0, horizon);
          gradientSky.addColorStop(0, "#111f19");
          gradientSky.addColorStop(1, "#0a1510");
          ctx.fillStyle = gradientSky;
          ctx.fillRect(0, 0, width, horizon);

          const floorGradient = ctx.createLinearGradient(0, horizon, 0, height);
          floorGradient.addColorStop(0, "#17231a");
          floorGradient.addColorStop(1, "#0a110d");
          ctx.fillStyle = floorGradient;
          ctx.fillRect(0, horizon, width, height - horizon);

          ctx.strokeStyle = "rgba(238, 246, 237, 0.025)";
          ctx.lineWidth = 1;
          for (let y = horizon + 34; y < height; y += 54) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(width, y);
            ctx.stroke();
          }

          const projectionPlane = width / (2 * Math.tan(FOV / 2));
          const stripeWidth = Math.max(2, Math.ceil(width / 260));
          for (let sx = 0; sx < width; sx += stripeWidth) {
            const rayAngle = player.angle - FOV / 2 + (sx / width) * FOV;
            const hit = castRay(rayAngle);
            const corrected = Math.max(8, hit.distance * Math.cos(rayAngle - player.angle));
            const wallHeight = (TILE * projectionPlane) / corrected;
            const distanceShade = -Math.min(92, corrected / 11);
            rayDepths[sx] = corrected;
            for (let fill = 1; fill < stripeWidth; fill += 1) {
              rayDepths[sx + fill] = corrected;
            }

            if (hit.tile === 1) {
              const top = horizon - wallHeight * 0.74;
              const bottom = horizon + wallHeight * 0.74;
              ctx.fillStyle = shadeColor("#27392e", distanceShade);
              ctx.fillRect(sx, top, stripeWidth + 1, bottom - top);
              ctx.fillStyle = "rgba(238, 246, 237, 0.08)";
              ctx.fillRect(sx, top, stripeWidth + 1, Math.max(2, wallHeight * 0.035));
            } else if (hit.tile === 2) {
              const top = horizon + wallHeight * 0.1;
              const bottom = horizon + wallHeight * 0.52;
              ctx.fillStyle = shadeColor("#53634f", distanceShade);
              ctx.fillRect(sx, top, stripeWidth + 1, bottom - top);
              ctx.fillStyle = "rgba(223, 191, 103, 0.28)";
              ctx.fillRect(sx, top, stripeWidth + 1, Math.max(2, wallHeight * 0.03));
            }
          }

          drawActors(projectionPlane, horizon);
        }

        function drawActors(projectionPlane, horizon) {
          const visibleActors = actors
            .map((actor) => {
              const dx = actor.x - player.x;
              const dy = actor.y - player.y;
              const distance = Math.hypot(dx, dy);
              const angleToActor = Math.atan2(dy, dx);
              const diff = normalizeAngle(angleToActor - player.angle);
              return { actor, distance, diff };
            })
            .filter((entry) => Math.abs(entry.diff) < FOV * 0.55 && entry.distance > 30)
            .sort((a, b) => b.distance - a.distance);

          for (const entry of visibleActors) {
            const screenX = (entry.diff / FOV + 0.5) * width;
            const depthIndex = clamp(Math.floor(screenX), 0, rayDepths.length - 1);
            if (entry.distance > rayDepths[depthIndex] - 18) continue;

            const size = clamp((TILE * projectionPlane / entry.distance) * entry.actor.height, 20, height * 0.62);
            const bodyWidth = size * (entry.actor.type === "hunter" ? 0.42 : 0.34);
            const x = screenX - bodyWidth / 2;
            const y = horizon - size * 0.72;
            ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
            ctx.beginPath();
            ctx.ellipse(screenX, horizon + size * 0.12, bodyWidth * 0.85, size * 0.16, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = entry.actor.color;
            ctx.fillRect(x, y, bodyWidth, size);
            ctx.fillStyle = entry.actor.type === "hunter" ? "#0b0d0a" : "#eef6ed";
            ctx.fillRect(x + bodyWidth * 0.22, y + size * 0.18, bodyWidth * 0.56, size * 0.08);
          }
        }

        function drawMiniMap() {
          const mapWidth = world[0].length;
          const mapHeight = world.length;
          const scale = Math.min(miniCanvas.width / mapWidth, miniCanvas.height / mapHeight);
          mini.clearRect(0, 0, miniCanvas.width, miniCanvas.height);
          mini.fillStyle = "rgba(9, 20, 14, 0.88)";
          mini.fillRect(0, 0, miniCanvas.width, miniCanvas.height);

          for (let row = 0; row < mapHeight; row += 1) {
            for (let col = 0; col < mapWidth; col += 1) {
              const tile = world[row][col];
              if (tile === 0) continue;
              mini.fillStyle = tile === 1 ? "#0d1712" : "#53634f";
              mini.fillRect(col * scale, row * scale, scale - 1, scale - 1);
            }
          }

          for (const actor of actors) {
            mini.fillStyle = actor.color;
            mini.beginPath();
            mini.arc((actor.x / TILE) * scale, (actor.y / TILE) * scale, actor.type === "hunter" ? 4 : 3, 0, Math.PI * 2);
            mini.fill();
          }

          const px = (player.x / TILE) * scale;
          const py = (player.y / TILE) * scale;
          mini.strokeStyle = player.role === "hunter" ? "rgba(215, 123, 110, 0.65)" : "rgba(223, 191, 103, 0.65)";
          mini.lineWidth = 2;
          mini.beginPath();
          mini.moveTo(px, py);
          mini.lineTo(px + Math.cos(player.angle - FOV / 2) * 28, py + Math.sin(player.angle - FOV / 2) * 28);
          mini.moveTo(px, py);
          mini.lineTo(px + Math.cos(player.angle + FOV / 2) * 28, py + Math.sin(player.angle + FOV / 2) * 28);
          mini.stroke();

          mini.fillStyle = player.role === "hunter" ? "#d77b6e" : "#dfbf67";
          mini.beginPath();
          mini.arc(px, py, 4.5, 0, Math.PI * 2);
          mini.fill();
        }

        function frame(now) {
          const dt = Math.min(0.033, (now - lastTime) / 1000);
          lastTime = now;
          turnPlayer(dt);
          movePlayer(dt);
          drawScene();
          drawMiniMap();
          if (running) requestAnimationFrame(frame);
        }

        function setRole(role) {
          player.role = role;
          roleReadout.textContent = role === "hunter" ? "追捕者" : "逃生者";
          player.radius = role === "hunter" ? 22 : 18;
          roleButtons.forEach((button) => {
            button.classList.toggle("is-active", button.dataset.role === role);
          });
        }

        function start3d() {
          overlay.classList.add("is-hidden");
          running = true;
          lastTime = performance.now();
          requestAnimationFrame(frame);
        }

        window.addEventListener("resize", resize);
        window.addEventListener("keydown", (event) => {
          keys.add(event.code);
          if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "KeyW", "KeyA", "KeyS", "KeyD"].includes(event.code)) {
            event.preventDefault();
          }
        });
        window.addEventListener("keyup", (event) => keys.delete(event.code));

        roleButtons.forEach((button) => {
          button.addEventListener("click", () => setRole(button.dataset.role));
        });
        start3dButton.addEventListener("click", start3d);
        changeModeButton.addEventListener("click", () => {
          running = false;
          overlay.classList.remove("is-hidden");
        });

        let movePointerId = null;
        movePad.addEventListener("pointerdown", (event) => {
          movePointerId = event.pointerId;
          movePad.setPointerCapture(movePointerId);
          updateMoveStick(event);
        });
        movePad.addEventListener("pointermove", (event) => {
          if (event.pointerId === movePointerId) updateMoveStick(event);
        });
        movePad.addEventListener("pointerup", clearMoveStick);
        movePad.addEventListener("pointercancel", clearMoveStick);

        function updateMoveStick(event) {
          const rect = movePad.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const max = rect.width * 0.34;
          const dx = clamp(event.clientX - cx, -max, max);
          const dy = clamp(event.clientY - cy, -max, max);
          const len = Math.min(1, Math.hypot(dx, dy) / max);
          const angle = Math.atan2(dy, dx);
          player.moveX = Math.cos(angle) * len;
          player.moveY = -Math.sin(angle) * len;
          moveKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle) * len * max}px), calc(-50% + ${Math.sin(angle) * len * max}px))`;
        }

        function clearMoveStick(event) {
          if (event.pointerId !== movePointerId) return;
          movePointerId = null;
          player.moveX = 0;
          player.moveY = 0;
          moveKnob.style.transform = "translate(-50%, -50%)";
        }

        let lookPointerId = null;
        let lookLastX = 0;
        let lookLastY = 0;
        lookPad.addEventListener("pointerdown", (event) => {
          lookPointerId = event.pointerId;
          lookLastX = event.clientX;
          lookLastY = event.clientY;
          lookPad.setPointerCapture(lookPointerId);
        });
        lookPad.addEventListener("pointermove", (event) => {
          if (event.pointerId !== lookPointerId) return;
          const dx = event.clientX - lookLastX;
          const dy = event.clientY - lookLastY;
          lookLastX = event.clientX;
          lookLastY = event.clientY;
          player.angle = normalizeAngle(player.angle + dx * TOUCH_LOOK_X);
          player.pitch = clamp(player.pitch + dy * TOUCH_LOOK_Y, -0.42, 0.42);
        });
        lookPad.addEventListener("pointerup", () => {
          lookPointerId = null;
        });
        lookPad.addEventListener("pointercancel", () => {
          lookPointerId = null;
        });

        resize();
        setRole("survivor");
        drawScene();
        drawMiniMap();
      })();
    </script>
